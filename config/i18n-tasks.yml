# i18n-tasks config — https://github.com/glebm/i18n-tasks
# Gates CI (test/i18n_test.rb) so pt-BR and en stay in sync with no missing/unused keys.

# English is the base the pt-BR default falls back to (config.i18n.fallbacks = [:en]).
base_locale: en

# Only the two locales we maintain standalone files for. :"en-US" is intentionally
# omitted: it has no config/locales/en-US.yml — it inherits every English app string
# from :en via Rails' dash-split fallback (see docs/i18n.md). Listing it would make
# i18n-tasks report every app key as "missing in en-US".
locales: [en, pt-BR]

data:
  read:
    - config/locales/%{locale}.yml
  yaml:
    write:
      line_width: -1

search:
  paths:
    - app/
  exclude:
    - app/assets
  # AST matchers so i18n-tasks understands two implicit lookups it cannot see textually:
  #   RailsModelMatcher        -> User.human_attribute_name(:email_address) (auth form labels)
  #   DefaultI18nSubjectMatcher-> default_i18n_subject in UserMailer/PasswordsMailer
  ast_matchers:
    - 'I18n::Tasks::Scanners::AstMatchers::RailsModelMatcher'
    - 'I18n::Tasks::Scanners::AstMatchers::DefaultI18nSubjectMatcher'

# Keys resolved dynamically by Rails form/label/error helpers (e.g. form.label
# :password_confirmation) that the scanner still can't match to a literal key.
ignore_unused:
  - 'activerecord.attributes.*'
  # Model human names — used implicitly by Rails (model_name.human); no literal key to scan.
  - 'activerecord.models.*'
  # Added by errors.add(:email_address, :not_allowed) in User — no literal key to scan.
  - 'activerecord.errors.*'
  # Looked up dynamically as t("onboarding.steps.#{step}") in the wizard progress bar.
  - 'onboarding.steps.*'
  # WhatsApp reply copy — resolved dynamically via WhatsappReply.deliver(key:) and
  # t("whatsapp.replies.#{...}"); no static literal for the scanner to match.
  - 'whatsapp.replies.*'
  # Admin panel + inbox status/type labels, looked up dynamically by enum value:
  #   t("admin.whatsapp_connections.statuses.#{status}")
  #   t("admin.whatsapp_messages.types.#{message_type}")
  #   t("transactions.statuses.#{status}")
  - 'admin.whatsapp_connections.statuses.*'
  - 'admin.whatsapp_messages.types.*'
  - 'transactions.statuses.*'
  # Default category names, seeded per user in their locale via t("categories.defaults").
  - 'categories.defaults'
  # Date format strings referenced only via l(date, format: :month_year) — the scanner
  # can't match the symbol to a literal key.
  - 'date.formats.*'
  # Income schedule-kind labels, looked up dynamically by enum value.
  - 'incomes.schedule_kinds.*'
  # Commitment labels looked up dynamically by enum value / occurrence status.
  - 'commitments.kinds.*'
  - 'commitments.occurrences.statuses.*'
  - 'commitments.form.kind_hints.*'
  # Document-import labels looked up dynamically:
  #   t("document_imports.kinds.#{kind}"), t("document_imports.errors.#{error_code}"),
  #   t("document_imports.found.#{group}", count:)
  - 'document_imports.kinds.*'
  - 'document_imports.errors.*'
  - 'document_imports.found.*'
  # Review group headings looked up as t("document_imports.review.groups.#{key}").
  - 'document_imports.review.groups.*'
