# Canonical registry of Brazilian financial institutions for the account & card pickers.
# Single source of truth — seeded into the `institutions` table by db/seeds.rb (dev/prod)
# and by test_helper (test). Keyed by the COMPE bank code (string; leading zeros kept)
# so the code is persisted on the institution entity for future integrations
# (Open Finance / Pix / reconciliation).
#
# logo_path is intentionally NOT listed here: seeds derive it from the presence of
# app/assets/images/institutions/<code>.svg, so vendoring an SVG auto-enables the real
# logo and its absence falls back to a brand-color monogram — no data change needed.
- { code: "260", name: "Nubank",          initials: "NU", brand_color: "#820AD1", position: 1 }
