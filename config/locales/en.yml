# Shared English base. :"en-US" inherits these app strings via the dash-split fallback.
# pt-BR is the default UI locale (ADR 0006 / docs/i18n.md); :en is never shown as a UI option.
en:
  hello: "Hello world"
  shared:
    rate_limited: "Too many attempts. Please try again in a few minutes."
  activerecord:
    attributes:
      user:
        email_address: "Email address"
        password: "Password"
        password_confirmation: "Password confirmation"
  registrations:
    new:
      title: "Create your account"
      submit: "Create account"
      sign_in_prompt: "Already have an account?"
      sign_in_link: "Sign in"
    create:
      check_email: "Check your email to confirm your account, then sign in."
  sessions:
    new:
      resend_summary: "Didn't get the confirmation email?"
      resend_submit: "Resend"
      resend_placeholder: "you@example.com"
    create:
      unverified: "Please confirm your email first — check your inbox, or resend the link below."
      invalid: "Try another email address or password."
  email_verifications:
    show:
      confirmed: "Email confirmed — welcome to azulzin."
      invalid: "That confirmation link is invalid or has expired."
    create:
      sent: "If that address still needs confirming, we've sent a new link."
  passwords:
    new:
      title: "Forgot your password?"
      email_placeholder: "Enter your email address"
      submit: "Email reset instructions"
    edit:
      title: "Update your password"
      password_placeholder: "Enter new password"
      password_confirmation_placeholder: "Repeat new password"
      submit: "Save"
    create:
      notice: "If an account exists for that email address, we've sent password reset instructions."
    update:
      success: "Your password has been reset."
      mismatch: "Passwords did not match."
    invalid_token: "The password reset link is invalid or has expired."
  user_mailer:
    email_verification:
      subject: "Confirm your email for azulzin"
      greeting: "Welcome to azulzin!"
      instructions: "Confirm your email address to activate your account."
      confirm: "Confirm my email"
      expiry: "This link expires in 24 hours."
      ignore: "If you didn't create an account, you can safely ignore this email."
  passwords_mailer:
    reset:
      subject: "Reset your azulzin password"
      intro: "You can reset your password using the link below."
      reset_link: "Reset my password"
      expiry: "This link will expire in %{duration}."
