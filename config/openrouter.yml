# Per-task AI model config (config.x.openrouter). Verify every slug against the provider's
# live model list before relying on it (see .plans/whats §4.1 / Review P1-1).
#
# extraction + vision → OpenRouter   (credentials: openrouter.api_key)
# transcription       → GROQ direct  (credentials: groq.api_key). It lives here too so every
#   model choice is in one file; OpenRouter has no transcription route. Override with the
#   GROQ_STT_MODEL env var.
extraction:
  model: "google/gemini-2.5-flash"
  temperature: 0
  max_tokens: 800
vision:
  model: "google/gemini-2.5-flash"
  temperature: 0
  max_tokens: 1000
transcription:
  model: "whisper-large-v3-turbo"   # Groq
  language: "pt"

# Document import (.plans/auto): statements/faturas are long — hence the larger token ceiling
# than the short WhatsApp extraction/vision tasks above.
import_extraction:
  model: "google/gemini-2.5-flash"
  temperature: 0
  max_tokens: 8000
import_vision:
  model: "google/gemini-2.5-flash"
  temperature: 0
  max_tokens: 8000

# Historical auto-categorization backfill (.plans/auto-categories Phase 5): batches of
# ~100 compact rows per call, closed-set category answers.
category_backfill:
  model: "google/gemini-2.5-flash"
  temperature: 0
  max_tokens: 8000

# Goals (.plans/goals 04): the ONLY two LLM touchpoints, both at goal-creation, both async with
# deterministic template fallbacks. goals_narrative phrases all 3 plan coach notes in one call
# (never computes money — digit-mismatch guard); goals_classify labels custom categories
# flexible/essential once, ever (closed-set, mirrors category_backfill).
goals_narrative:
  model: "google/gemini-2.5-flash"
  temperature: 0.4
  max_tokens: 500
goals_classify:
  model: "google/gemini-2.5-flash"
  temperature: 0
  max_tokens: 300
