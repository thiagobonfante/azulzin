production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  whatsapp_service_health_check:
    class: WhatsappServiceHealthCheckJob
    queue: whatsapp
    schedule: every 30 seconds
  whatsapp_retention_purge:
    class: WhatsappRetentionJob
    queue: whatsapp
    schedule: every day at 4am
  document_import_retention_purge:
    class: DocumentImportRetentionJob
    queue: imports
    schedule: every day at 4am
  notification_retention_purge:
    class: NotificationRetentionJob
    queue: background
    schedule: every day at 4am
  reminders_daily_dispatch:
    class: Reminders::DailyDispatchJob
    queue: default
    schedule: every day at 11am # UTC => 08:00 America/Sao_Paulo, after quiet hours
  budgets_weekly_check:
    class: Budgets::WeeklyCheckDispatchJob
    queue: default
    schedule: every monday at 11am # UTC => 08:00 America/Sao_Paulo (D6: weekly sweep)
  goals_weekly_check:
    class: Goals::WeeklyCheckDispatchJob
    queue: default
    schedule: every monday at 11am # UTC => 08:00 America/Sao_Paulo (.plans/goals 06 §2)
  summaries_weekly:
    class: Summaries::WeeklyDispatchJob
    queue: default
    schedule: every sunday at 23:00 # UTC => 20:00 America/Sao_Paulo Sunday — end-of-week
  summaries_monthly:
    class: Summaries::MonthlyDispatchJob
    queue: default
    schedule: every month on the 1st at 11am # UTC => 08:00 SP on the 1st — recaps the closed month
