production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  whatsapp_service_health_check:
    class: WhatsappServiceHealthCheckJob
    queue: whatsapp
    schedule: every 30 seconds
  whatsapp_retention_purge:
    class: WhatsappRetentionJob
    queue: whatsapp
    schedule: every day at 4am
  document_import_retention_purge:
    class: DocumentImportRetentionJob
    queue: imports
    schedule: every day at 4am
  notification_retention_purge:
    class: NotificationRetentionJob
    queue: background
    schedule: every day at 4am
